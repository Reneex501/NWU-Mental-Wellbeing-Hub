<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Self-Help Tools</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="header">
    <div class="logo-title">
    <img src="logo.png">

    <h1>NWU Mental wellbeing Hub</h1>
    <nav>
        <a href="home.html">Home</a>
        <a href="resources.html">Resources</a>
        <a href="support.html">Support</a>
        <a href="self-help tools.html">Self-Help Tools</a>
        
    </nav>
</p>
</header>
</body>
<main>

    <!-- MOOD CHECKER -->
    <section>
        <h2>Mood Checker</h2>
        <p>How are you feeling today?</p>

        <select id="mood">
            <option value="">Select mood</option>
            <option value="happy">😊 Happy</option>
            <option value="sad">😢 Sad</option>
            <option value="stressed">😫 Stressed</option>
            <option value="anxious">😟 Anxious</option>
        </select>

        <button onclick="checkMood()">Get Advice</button>
        <p id="moodResult"></p>
    </section>

    <!-- BREATHING EXERCISE -->
    <section>
        <h2>Breathing Exercise</h2>
        <p id="breathingText">Click start to begin</p>
        <button onclick="startBreathing()">Start</button>
    </section>

    <!-- STUDY STRESS QUIZ -->
    <section>
        <h2>Stress Level Quiz</h2>

        <p>How often do you feel overwhelmed?</p>
        <select id="q1">
            <option value="0">Rarely</option>
            <option value="1">Sometimes</option>
            <option value="2">Often</option>
        </select>

        <p>Do you struggle to sleep?</p>
        <select id="q2">
            <option value="0">No</option>
            <option value="1">Sometimes</option>
            <option value="2">Yes</option>
        </select>

        <br><br>
        <button onclick="calculateStress()">Check Stress Level</button>
        <p id="stressResult"></p>
    </section>

</main>

<script src="script.js"></script>
</body>
</html>
